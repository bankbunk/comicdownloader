name: Download Manga
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 curl-cffi

      - name: Run Scraper
        run: python -u scraper-manhwatop.py

      - name: Zip into safe 150-chapter chunks (Bypass 2GB Limit)
        run: |
          mkdir -p Release_Zips
          cd CBZ_Files
          # Group the CBZ files into batches of 150 to keep zip sizes under 2GB
          files=( *.cbz )
          chunk_size=150
          for (( i=0; i<${#files[@]}; i+=chunk_size )); do
            part=$(printf "%02d" $((i/chunk_size + 1)))
            # -0 means "store" (don't recompress already compressed files, makes it instant)
            zip -0 ../Release_Zips/Lookism_Part_${part}.zip "${files[@]:i:chunk_size}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}
          name: "Lookism Download - Run ${{ github.run_number }}"
          body: "Automated manga download. Split into parts to bypass GitHub's 2GB file limit."
          files: Release_Zips/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
