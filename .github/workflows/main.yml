name: Download Manga
on:
  workflow_dispatch:
    inputs:
      storage_mode:
        description: 'Where to save the downloaded files?'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - repo

permissions:
  contents: write

jobs:
  scrape-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 curl-cffi playwright
          playwright install chromium
          sudo apt-get install -y zip

      - name: Run Scraper
        run: python -u scraper.py

      - name: Zip for Release (Smart Size Calculation - 1.9GB max)
        if: github.event.inputs.storage_mode == 'release'
        run: |
          mkdir -p Release_Zips
          cd CBZ_Files
          
          shopt -s nullglob
          files=( *.cbz )
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CBZ files found to zip. Exiting."
            exit 0
          fi
          
          # Max size per zip: 1.9 GB (in bytes) to safely stay under GitHub's 2GB (2147483648 bytes) limit
          MAX_SIZE=$(( 1900 * 1024 * 1024 ))
          current_size=0
          part=1
          files_to_zip=()
          
          for file in "${files[@]}"; do
            file_size=$(stat -c%s "$file")
            
            # If adding this file exceeds the limit, package the current batch and reset
            if (( current_size + file_size > MAX_SIZE )) && (( ${#files_to_zip[@]} > 0 )); then
              part_formatted=$(printf "%02d" $part)
              echo "Packing Part ${part_formatted} (Size: $((current_size / 1024 / 1024)) MB)..."
              zip -0 "../Release_Zips/Lookism_Ch_${CH_START}_to_${CH_END}_Part_${part_formatted}.zip" "${files_to_zip[@]}"
              
              part=$((part + 1))
              current_size=0
              files_to_zip=()
            fi
            
            files_to_zip+=("$file")
            current_size=$((current_size + file_size))
          done
          
          # Zip any remaining files
          if (( ${#files_to_zip[@]} > 0 )); then
            part_formatted=$(printf "%02d" $part)
            echo "Packing Part ${part_formatted} (Size: $((current_size / 1024 / 1024)) MB)..."
            zip -0 "../Release_Zips/Lookism_Ch_${CH_START}_to_${CH_END}_Part_${part_formatted}.zip" "${files_to_zip[@]}"
          fi

      - name: Create Release
        if: github.event.inputs.storage_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}
          name: "Lookism Download (Ch ${{ env.CH_START }} - ${{ env.CH_END }}) - Run ${{ github.run_number }}"
          body: "Automated manga download from Comix.to. Files packed dynamically to stay exactly under the 2GB limit."
          files: Release_Zips/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip for Repo (95MB chunks)
        if: github.event.inputs.storage_mode == 'repo'
        run: |
          RUN_DIR="downloads/run_${{ github.run_id }}_${CH_START}_to_${CH_END}"
          mkdir -p "$RUN_DIR"
          cd CBZ_Files
          
          shopt -s nullglob
          files=( *.cbz )
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CBZ files found to zip. Exiting."
            exit 0
          fi
          
          zip -0 -s 95m "../$RUN_DIR/Lookism_${CH_START}_to_${CH_END}.zip" *.cbz

      - name: Commit and Force Push
        if: github.event.inputs.storage_mode == 'repo'
        run: |
          RUN_DIR="downloads/run_${{ github.run_id }}_${CH_START}_to_${CH_END}"
          
          if [ ! -d "$RUN_DIR" ] || [ -z "$(ls -A $RUN_DIR)" ]; then
            echo "No split zips found to commit."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git checkout --orphan temp_branch
          
          git add -A
          git reset ${RUN_DIR}/* 2>/dev/null || true
          
          git commit -m "Prepare vault for Job ${{ github.run_id }} [skip ci]" || true
          git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
          
          for file in ${RUN_DIR}/*; do
            if [ -f "$file" ]; then
              echo "Committing $file..."
              git add "$file"
              git commit --amend --no-edit
              git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
            fi
          done
          
          git commit --amend -m "Add Lookism Ch ${CH_START} to ${CH_END} (Run ${{ github.run_id }}) [skip ci]"
          git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
