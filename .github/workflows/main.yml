name: Download Manga
on:
  workflow_dispatch:
    inputs:
      storage_mode:
        description: 'Where to save the downloaded files?'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - repo

permissions:
  contents: write

jobs:
  scrape-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 curl-cffi playwright
          playwright install chromium
          sudo apt-get install -y zip

      - name: Run Scraper
        run: python -u scraper.py

      - name: Zip for Release (OG Method - 150 Chapters/Zip)
        if: github.event.inputs.storage_mode == 'release'
        run: |
          mkdir -p Release_Zips
          cd CBZ_Files
          
          shopt -s nullglob
          files=( *.cbz )
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CBZ files found to zip. Exiting."
            exit 0
          fi
          
          chunk_size=150
          for (( i=0; i<${#files[@]}; i+=chunk_size )); do
            part=$(printf "%02d" $((i/chunk_size + 1)))
            zip -0 ../Release_Zips/Lookism_Ch_${CH_START}_to_${CH_END}_Part_${part}.zip "${files[@]:i:chunk_size}"
          done

      - name: Create Release
        if: github.event.inputs.storage_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}
          name: "Lookism Download (Ch ${{ env.CH_START }} - ${{ env.CH_END }}) - Run ${{ github.run_number }}"
          body: "Automated manga download from Comix.to. Split into parts to bypass GitHub's 2GB file limit."
          files: Release_Zips/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip for Repo (95MB chunks)
        if: github.event.inputs.storage_mode == 'repo'
        run: |
          RUN_DIR="downloads/run_${{ github.run_id }}_${CH_START}_to_${CH_END}"
          mkdir -p "$RUN_DIR"
          cd CBZ_Files
          
          shopt -s nullglob
          files=( *.cbz )
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CBZ files found to zip. Exiting."
            exit 0
          fi
          
          zip -0 -s 95m "../$RUN_DIR/Lookism_${CH_START}_to_${CH_END}.zip" *.cbz

      - name: Commit and Force Push
        if: github.event.inputs.storage_mode == 'repo'
        run: |
          RUN_DIR="downloads/run_${{ github.run_id }}_${CH_START}_to_${CH_END}"
          
          if [ ! -d "$RUN_DIR" ] || [ -z "$(ls -A $RUN_DIR)" ]; then
            echo "No split zips found to commit."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git checkout --orphan temp_branch
          
          git add -A
          git reset ${RUN_DIR}/* 2>/dev/null || true
          
          git commit -m "Prepare vault for Job ${{ github.run_id }} [skip ci]" || true
          git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
          
          for file in ${RUN_DIR}/*; do
            if [ -f "$file" ]; then
              echo "Committing $file..."
              git add "$file"
              git commit --amend --no-edit
              git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
            fi
          done
          
          git commit --amend -m "Add Lookism Ch ${CH_START} to ${CH_END} (Run ${{ github.run_id }}) [skip ci]"
          git -c push.useForceIfIncludes=false push --force origin HEAD:${GITHUB_REF_NAME}
