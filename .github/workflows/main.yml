name: Download Manga
on:
  workflow_dispatch:

# Required permission to create a Release
permissions:
  contents: write

jobs:
  scrape-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 curl-cffi

      - name: Run Scraper
        run: python -u scraper.py

      - name: Zip the CBZ files
        run: zip -r Lookism_Chapters.zip CBZ_Files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}
          name: "Lookism Download - Run ${{ github.run_number }}"
          body: "Automated manga download."
          files: Lookism_Chapters.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
